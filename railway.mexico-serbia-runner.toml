# Runner México vs Serbia — reemplaza temporalmente livescore-relay.
# Deploy: powershell -File scripts/deploy-mexico-serbia-runner.ps1

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.mexico-serbia-runner"

[deploy]
startCommand = "node scripts/run-mexico-serbia-live-runner.mjs"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
